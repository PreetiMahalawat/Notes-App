<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Notes | Preeti</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background -->
    <div class="background"></div>

    <div class="container">

        <!-- Header -->
        <header>

            <div class="logo">

                <i class="fa-solid fa-book-open"></i>

                <div>

                    <h1>Smart Notes</h1>

                    <p>Capture • Organize • Remember</p>

                </div>

            </div>

            <button id="themeBtn" title="Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>

        </header>

        <!-- Search -->
        <section class="search-section">

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="search"
                    placeholder="Search your notes...">

            </div>

        </section>

        <!-- Dashboard -->
        <section class="dashboard">

            <div class="card">

                <i class="fa-solid fa-note-sticky"></i>

                <h2 id="count">0</h2>

                <span>Total Notes</span>

            </div>

            <div class="card">

                <i class="fa-solid fa-calendar-day"></i>

                <h2 id="todayCount">0</h2>

                <span>Today's Notes</span>

            </div>

            <div class="card">

                <i class="fa-solid fa-clock"></i>

                <h2 id="currentTime">--:--</h2>

                <span>Current Time</span>

            </div>

        </section>

        <!-- Form -->
        <section class="form-section">

            <h2>Create New Note</h2>

            <input
                type="text"
                id="title"
                placeholder="Enter Note Title">

            <textarea
                id="description"
                placeholder="Write your thoughts here..."></textarea>

            <button id="addBtn">

                <i class="fa-solid fa-plus"></i>

                Add Note

            </button>

        </section>

        <!-- Notes -->
        <section class="notes-section">

            <div class="section-title">

                <h2>Your Notes</h2>

            </div>

            <div id="notesContainer">

                <!-- Notes will come here -->

            </div>

        </section>

    </div>

    <!-- Delete Modal -->
    <div class="modal" id="deleteModal">

        <div class="modal-content">

            <i class="fa-solid fa-trash-can modal-icon"></i>

            <h2>Delete Note?</h2>

            <p>This action cannot be undone.</p>

            <div class="modal-buttons">

                <button id="cancelDelete">

                    Cancel

                </button>

                <button id="confirmDelete">

                    Delete

                </button>

            </div>

        </div>

    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Loader -->
    <div id="loader">

        <div class="spinner"></div>

    </div>

    <!-- Footer -->
    <footer>

        <p>

            Made with ❤️ by <strong>Preeti Choudhary</strong>

        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
